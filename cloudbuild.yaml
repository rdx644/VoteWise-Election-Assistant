steps:
  # Step 1: Run tests
  - name: 'python:3.12-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        APP_ENV=testing RATE_LIMIT_RPM=10000 RATE_LIMIT_BURST=10000 \
        python -m pytest backend/tests/ -v --tb=short

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/votewise-election-assistant:$COMMIT_SHA', '.']

  # Step 3: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/votewise-election-assistant:$COMMIT_SHA']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'votewise-election-assistant'
      - '--image=gcr.io/$PROJECT_ID/votewise-election-assistant:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--set-env-vars=APP_ENV=production,DATABASE_MODE=memory,TTS_MODE=browser,GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/votewise-election-assistant:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
