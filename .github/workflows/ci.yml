name: CI — VoteWise Election Assistant

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term-missing
        env:
          APP_ENV: testing
          RATE_LIMIT_RPM: "10000"
          RATE_LIMIT_BURST: "10000"

  lint:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff==0.8.6
      - run: ruff check backend/ --config pyproject.toml
      - run: ruff format --check backend/ --config pyproject.toml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff==0.8.6
      - run: ruff check backend/ --select S --ignore S101,S104,S311 --config pyproject.toml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t votewise-test .
